[wifi_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
image=wifi_fw_ipq5424_qcn9224_v2_squashfs.img
vol_size=12288KiB
vol_type=static
# Volume ID in UBI image
vol_id=0
# Volume name
vol_name=wifi_fw

[kernel]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq54xx-ipq54xx_32-qcom_maxx-fit-uImage.itb
vol_size=7MiB
vol_type=static
# Volume ID in UBI image
vol_id=1
# Volume name
vol_name=kernel

[cal_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
image=WLAN_CALDB_qcn9224_v2_merged_compressed.img
vol_size=2MiB
vol_type=static
# Volume ID in UBI image
vol_id=2
# Volume name
vol_name=cal_fw

[rootfs]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq54xx-ipq54xx_32-squashfs-root.img
# Volume ID in UBI image
vol_id=3
# Allow for dynamic resize
vol_type=dynamic
# Volume name
vol_name=ubi_rootfs

[rootfs_data]
mode=ubi
# this is arbitrary, since autoresize below will use up the remaining
# free space on the mtd volume
vol_size=1KiB
vol_id=4
vol_type=dynamic
vol_name=rootfs_data
vol_flags=autoresize
