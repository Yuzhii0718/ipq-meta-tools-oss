[kernel]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq96xx-ipq96xx_32-qcom_KERNEL_DTB_NAME-fit-uImage.itb
vol_size=10MiB
vol_type=static
# Volume ID in UBI image
vol_id=0
# Volume name
vol_name=kernel

[rootfs]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq96xx-ipq96xx_32-squashfs-root.img
# Volume ID in UBI image
vol_id=1
# Allow for dynamic resize
vol_type=dynamic
# Volume name
vol_name=ubi_rootfs

[rootfs_data]
mode=ubi
# this is arbitrary, since autoresize below will use up the remaining
# free space on the mtd volume
vol_size=1KiB
vol_id=2
vol_type=dynamic
vol_name=rootfs_data
vol_flags=autoresize

[prime_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
image=prime_fw_ipq9650_squashfs.img
vol_size=512KiB
vol_type=static
# Volume ID in UBI image
vol_id=3
# Volume name
vol_name=prime_fw

[cdsp_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
image=cdsp_ipq9650_squashfs.img
vol_size=15MiB
vol_type=static
# Volume ID in UBI image
vol_id=4
# Volume name
vol_name=cdsp_fw

[wifi_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
vol_type=static
# Volume ID in UBI image
vol_id=5
# Volume name
vol_name=wifi_fw

[cal_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
vol_type=static
# Volume ID in UBI image
vol_id=6
# Volume name
vol_name=cal_fw

