[kernel]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq52xx-ipq52xx_32-qcom_KERNEL_DTB_NAME-fit-uImage.itb
vol_size=7MiB
vol_type=static
# Volume ID in UBI image
vol_id=0
# Volume name
vol_name=kernel

[rootfs]
# Volume mode (other option is static)
mode=ubi
# Source image
image=openwrt-ipq52xx-ipq52xx_32-squashfs-root.img
# Volume ID in UBI image
vol_id=1
# Allow for dynamic resize
vol_type=dynamic
# Volume name
vol_name=ubi_rootfs

[rootfs_data]
mode=ubi
# this is arbitrary, since autoresize below will use up the remaining
# free space on the mtd volume
vol_size=1KiB
vol_id=2
vol_type=dynamic
vol_name=rootfs_data
vol_flags=autoresize

[wifi_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
vol_type=static
# Volume ID in UBI image
vol_id=3
# Volume name
vol_name=wifi_fw

[cal_fw]
# Volume mode (other option is static)
mode=ubi
# Source image
vol_type=static
# Volume ID in UBI image
vol_id=4
# Volume name
vol_name=cal_fw
